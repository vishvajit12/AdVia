<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA37A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F2622E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="40" height="40" rx="8" fill="url(#logoBg)" />
  
  <!-- Modern transit icon -->
  <g transform="translate(20, 20)">
    <!-- Vehicle body (auto-rickshaw style) -->
    <rect x="-7" y="-2" width="14" height="8" rx="1.5" fill="white" opacity="0.95" />
    
    <!-- Cabin/roof (trapezoid shape) -->
    <path d="M -6 -2 L -3 -5 L 3 -5 L 6 -2" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" />
    
    <!-- Front left wheel -->
    <circle cx="-5" cy="6" r="1.8" fill="white" opacity="0.9" />
    <circle cx="-5" cy="6" r="1" fill="url(#logoBg)" opacity="0.4" />
    
    <!-- Front right wheel -->
    <circle cx="5" cy="6" r="1.8" fill="white" opacity="0.9" />
    <circle cx="5" cy="6" r="1" fill="url(#logoBg)" opacity="0.4" />
    
    <!-- Window accent -->
    <rect x="-2" y="-1" width="4" height="2.5" rx="0.5" fill="white" opacity="0.6" />
    
    <!-- Route indicator (curved path) -->
    <path d="M -2 8 Q 0 10 2 8" stroke="white" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7" />
  </g>
</svg>